apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    app: web
spec:
  type: NodePort          # ClusterIP (default, internal) | NodePort (dev external) | LoadBalancer (prod)
  selector:
    app: web              # route to Pods carrying this label (matches the Deployment's Pod labels)
  ports:
    - port: 80            # the Service's own port (inside the cluster)
      targetPort: 80      # the container port on the Pods to forward to
      # nodePort: 30904   # optional: pin a port in 30000-32767; omit to let K8s pick one
