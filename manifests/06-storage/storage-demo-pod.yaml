apiVersion: v1
kind: Pod
metadata:
  name: storage-demo
spec:
  containers:
    - name: demo
      image: busybox
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data # the PVC shows up here inside the container
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: data-pvc # mount the claim we made above
